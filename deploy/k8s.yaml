apiVersion: apps/v1
kind: Deployment
metadata: { name: partnermap, labels: { app: partnermap } }
spec:
  replicas: 1
  selector: { matchLabels: { app: partnermap } }
  template:
    metadata: { labels: { app: partnermap } }
    spec:
      containers:
        - name: partnermap
          image: ghcr.io/cognis-digital/partnermap:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: partnermap }
spec:
  selector: { app: partnermap }
  ports: [{ port: 80, targetPort: 8000 }]
